<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WS Chat</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Syne:wght@500;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f14;
            --surface: #151820;
            --border: #222635;
            --accent: #4f8ef7;
            --accent-dim: #1e2d4a;
            --sent-bg: #1a2540;
            --recv-bg: #181c26;
            --text: #e2e6f0;
            --muted: #5a6075;
            --green: #3ecf6e;
            --radius: 12px;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.03em;
        }

        .tag {
            margin-left: auto;
            font-size: 10px;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.05em;
        }

        /* Chat area */
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        #chat-box::-webkit-scrollbar {
            width: 4px;
        }

        #chat-box::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .msg {
            display: flex;
            flex-direction: column;
            max-width: 72%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.sent {
            align-self: flex-end;
            align-items: flex-end;
        }

        .msg.recv {
            align-self: flex-start;
            align-items: flex-start;
        }

        .msg-meta {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 4px;
            padding: 0 4px;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: var(--radius);
            line-height: 1.6;
            word-break: break-word;
        }

        .sent .msg-bubble {
            background: var(--sent-bg);
            border: 1px solid #2a3d6a;
            border-bottom-right-radius: 3px;
            color: #c8d8ff;
        }

        .recv .msg-bubble {
            background: var(--recv-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 3px;
        }

        /* System message */
        .sys-msg {
            align-self: center;
            font-size: 10px;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Input area */
        #input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        #msg-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        #msg-input:focus {
            border-color: var(--accent);
        }

        #msg-input::placeholder {
            color: var(--muted);
        }

        #send-btn {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 12px;
            padding: 10px 18px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }

        #send-btn:hover {
            opacity: 0.85;
        }

        #send-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <div class="status-dot"></div>
            <h1>WS Chat</h1>
            <span class="tag">ws://localhost:8080</span>
        </header>

        <div id="chat-box">
            <div class="sys-msg">Connected to server</div>
        </div>

        <div id="input-area">
            <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off" />
            <button id="send-btn">SEND</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        const ws = new WebSocket('ws://localhost:4000')

        ws.onopen = () => {
            ws.send("Hello")
        }
        ws.onmessage = (event) => {
            appendMsg(event.data, 'recv', 'server')
        }
        ws.onclose = () => {
            console.log('disconnected')
        }
        ws.onerror = (err) => {
            console.log('got an error', err)
        }

        function now() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function appendMsg(text, type = 'recv', label = 'server') {
            const wrap = document.createElement('div');
            wrap.className = `msg ${type}`;

            const meta = document.createElement('div');
            meta.className = 'msg-meta';
            meta.textContent = `${label} · ${now()}`;

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = text;

            wrap.appendChild(meta);
            wrap.appendChild(bubble);
            chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            appendMsg(text, 'sent', 'you');
            ws.send(text)
            input.value = '';

        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>

</html>
