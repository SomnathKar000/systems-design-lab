<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>
</head>

<body>
    <h1>Hey</h1>
    <p>This is my first web page.</p>
    <p id="data-id"> This is my data: </p>
</body>

<script>
    async function fetchData(lastData) {
        try {
            const response = await fetch(`/getData?last_data=${lastData}`);
            const data = await response.json()

            document.getElementById("data-id").textContent = `This is my data: ${data.data}`
             
            fetchData(data.data)
        } catch (error) {
            console.log('Got an error', error)
        }
    }
    fetchData(null)
</script>

</html>
